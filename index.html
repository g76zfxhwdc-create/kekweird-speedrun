<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'JetBrains Mono', monospace; background: #0e0c1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; color: #e0d7ff; position: relative; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 0%, #3a1a6e33 0%, transparent 70%); pointer-events: none; }
.title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 7vw, 5rem); letter-spacing: 0.08em; color: #c9a0ff; text-align: center; line-height: 1; margin-bottom: 0.1rem; }
.subtitle { font-size: 12px; color: #7c6aaa; text-align: center; margin-bottom: 1.5rem; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 7px; }
.subtitle img { width: 24px; height: 24px; image-rendering: pixelated; vertical-align: middle; }
.stats-row { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; justify-content: center; }
.stat-box { background: #1a1530; border: 0.5px solid #3a2d6a; border-radius: 10px; padding: 0.6rem 1.4rem; text-align: center; min-width: 100px; }
.stat-label { font-size: 10px; color: #6b5e99; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 3px; }
.stat-value { font-size: 28px; font-weight: 700; color: #c9a0ff; line-height: 1; }
.stat-value.warn { color: #ff6b6b; animation: pulse 0.5s ease-in-out infinite alternate; }
.stat-value.green { color: #5dca8a; }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
.record-bar { width: 100%; max-width: 540px; background: #1a1530; border: 0.5px solid #3a2d6a; border-radius: 8px; padding: 0.5rem 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7c6aaa; }
.record-bar img { width: 28px; height: 28px; image-rendering: pixelated; flex-shrink: 0; }
.record-bar span { color: #ff9a3c; font-weight: 700; }
.progress-container { width: 100%; max-width: 540px; margin-bottom: 1.25rem; }
.progress-track { height: 6px; background: #1a1530; border-radius: 3px; position: relative; margin-bottom: 20px; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #7a5aaa, #c9a0ff); transition: width 0.25s; }
.fiona-line { position: absolute; top: -6px; height: 18px; border-left: 2px dashed #ff9a3c; }
.fiona-label { position: absolute; top: -18px; transform: translateX(-50%); font-size: 10px; color: #ff9a3c; white-space: nowrap; }
.progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: #6b5e99; }
.typing-area { width: 100%; max-width: 540px; background: #1a1530; border: 1.5px solid #3a2d6a; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.target-word { font-family: 'JetBrains Mono', monospace; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 700; letter-spacing: 0.15em; text-align: center; margin-bottom: 0.75rem; user-select: none; }
.char { display: inline-block; transition: color 0.05s; color: #4a3d7a; }
.char.correct { color: #c9a0ff; }
.char.wrong { color: #ff4d6d; background: #2a1025; border-radius: 3px; }
.char.cursor { border-bottom: 2px solid #c9a0ff; animation: blink 0.8s step-end infinite; }
@keyframes blink { 50% { border-color: transparent; } }
#typed-input { width: 100%; background: #0e0c1a; border: 0.5px solid #3a2d6a; border-radius: 8px; padding: 0.6rem 1rem; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #e0d7ff; outline: none; caret-color: #c9a0ff; user-select: none; }
#typed-input:focus { border-color: #7a5aaa; }
#typed-input.wrong-input { border-color: #ff4d6d; background: #1a0a14; animation: shake 0.15s ease; }
#typed-input.correct-flash { border-color: #5dca8a; background: #0a1a12; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.emote-burst { position: fixed; pointer-events: none; z-index: 9999; animation: burst 0.9s ease-out forwards; }
.emote-burst img { width: 56px; height: 56px; image-rendering: pixelated; display: block; }
@keyframes burst { 0% { transform: scale(0.3) translateY(0); opacity: 1; } 100% { transform: scale(2.2) translateY(-100px); opacity: 0; } }
.start-btn { background: #7a5aaa; color: #fff; border: none; border-radius: 10px; padding: 0.75rem 3rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.15s, transform 0.1s; }
.start-btn:hover { background: #9a7acc; transform: scale(1.03); }
.start-btn:active { transform: scale(0.97); }
.result-screen { text-align: center; animation: fadeIn 0.4s ease; width: 100%; max-width: 540px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
.result-emotes { display: flex; justify-content: center; gap: 8px; margin-bottom: 0.75rem; }
.result-emotes img { width: 56px; height: 56px; image-rendering: pixelated; }
.result-big { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 14vw, 8rem); color: #c9a0ff; line-height: 1; margin: 0.2rem 0; }
.result-label { font-size: 11px; color: #7c6aaa; letter-spacing: 0.15em; text-transform: uppercase; }
.verdict { font-size: 1rem; margin: 0.75rem 0 1rem; color: #e0d7ff; line-height: 1.6; }
.verdict .hl { color: #ff9a3c; font-weight: 700; }
.verdict .win { color: #5dca8a; font-weight: 700; }
.name-entry { width: 100%; max-width: 540px; margin-bottom: 0.75rem; display: flex; gap: 8px; }
.name-entry input { flex: 1; background: #0e0c1a; border: 0.5px solid #3a2d6a; border-radius: 8px; padding: 0.6rem 1rem; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #e0d7ff; outline: none; caret-color: #c9a0ff; }
.name-entry input:focus { border-color: #7a5aaa; }
.name-entry input::placeholder { color: #4a3d7a; }
.save-btn { background: #5dca8a; color: #0e0c1a; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer; white-space: nowrap; transition: background 0.15s, transform 0.1s; }
.save-btn:hover { background: #7adda0; transform: scale(1.03); }
.save-btn:active { transform: scale(0.97); }
.save-btn:disabled { background: #3a2d6a; color: #6b5e99; cursor: default; transform: none; }
.leaderboard { width: 100%; max-width: 540px; background: #1a1530; border: 0.5px solid #3a2d6a; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
.lb-title { font-size: 10px; color: #6b5e99; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.75rem; text-align: center; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid #2a2040; font-size: 13px; }
.lb-row:last-child { border-bottom: none; }
.lb-rank { color: #6b5e99; min-width: 22px; font-size: 11px; text-align: right; }
.lb-name { flex: 1; color: #e0d7ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-score { color: #c9a0ff; font-weight: 700; }
.lb-score.beat { color: #5dca8a; }
.lb-empty { color: #4a3d7a; font-size: 12px; text-align: center; padding: 0.5rem 0; }
.saved-msg { font-size: 12px; color: #5dca8a; margin-bottom: 0.75rem; }
.histogram-wrap { width: 100%; max-width: 540px; background: #1a1530; border: 0.5px solid #3a2d6a; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.histogram-title { font-size: 10px; color: #6b5e99; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.6rem; text-align: center; }
.histogram-stat { font-size: 12px; color: #7c6aaa; text-align: center; margin-top: 0.6rem; line-height: 1.5; }
.histogram-stat .hl { color: #c9a0ff; font-weight: 700; }
.histogram-stat .hl.top { color: #5dca8a; }

// ── LEADERBOARD ──────────────────────────────────────────────────────

async function fetchLeaderboard() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/scores?select=name,score&order=score.desc&limit=500&apikey=' + SUPABASE_KEY, {
      headers: { 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    const best = {};
    data.forEach(function(r) {
      const key = r.name.toLowerCase();
      if (!best[key] || r.score > best[key].score) best[key] = r;
    });
    const top10 = Object.values(best).sort(function(a,b) { return b.score - a.score; }).slice(0, 10);
    renderLeaderboard(top10);
  } catch(e) {
    document.getElementById('lb-list').innerHTML = '<div class="lb-empty">Could not load scores.</div>';
  }
}

function renderLeaderboard(rows) {
  const el = document.getElementById('lb-list');
  if (!rows || rows.length === 0) { el.innerHTML = '<div class="lb-empty">No scores yet. Be the first!</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = rows.map(function(r, i) {
    const rank = medals[i] || (i+1)+'.';
    const beatClass = r.score >= FIONA ? ' beat' : '';
    return '<div class="lb-row"><span class="lb-rank">' + rank + '</span><span class="lb-name">' + escHtml(r.name) + '</span><span class="lb-score' + beatClass + '">' + r.score + '</span></div>';
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SAVE SCORE (via Cloudflare Worker) ──────────────────────────────

async function saveScore(name, score) {
  saveBtn.disabled = true; saveBtn.textContent = '...';
  try {
    const res = await fetch(WORKER_URL + '/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: sessionToken, name: name, score: score })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    savedMsg.style.display = 'block';
    lastSavedName = name;
    fetchLeaderboard();
    sessionToken = null;
  } catch(e) {
    saveBtn.disabled = false;
    saveBtn.textContent = 'SAVE';
    alert('Could not save score: ' + e.message);
  }
}

saveBtn.addEventListener('click', function() {

});

// ── HISTOGRAM ────────────────────────────────────────────────────────

async function fetchAndDrawHistogram(myScore) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/scores?select=name,score&order=score.desc&limit=500&apikey=' + SUPABASE_KEY, {
      headers: { 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    const scores = data
      .filter(function(r) { return r.score !== 150 && r.score >= 5; })
      .map(function(r) { return r.score; });

    if (scores.length === 0) return;

    const BUCKET = 2;
    const maxScore = Math.max.apply(null, scores.concat([myScore]));
    const numBuckets = Math.ceil((maxScore + 1) / BUCKET);
    const buckets = new Array(numBuckets).fill(0);
    scores.forEach(function(s) { buckets[Math.floor(s / BUCKET)]++; });

    const below = scores.filter(function(s) { return s < myScore; }).length;
    const topPercent = 100 - Math.round((below / scores.length) * 100);

    const W = 500, H = 120;
    const PAD_L = 28, PAD_R = 8, PAD_T = 10, PAD_B = 24;
    const chartW = W - PAD_L - PAD_R;
    const chartH = H - PAD_T - PAD_B;
    const maxCount = Math.max.apply(null, buckets.concat([1]));
    const myBucket = Math.floor(myScore / BUCKET);
    const barW = chartW / numBuckets;

    let bars = '', xLabels = '';
    for (let i = 0; i < numBuckets; i++) {
      const barH = buckets[i] === 0 ? 0 : Math.max(2, (buckets[i] / maxCount) * chartH);
      const x = PAD_L + i * barW;
      const y = PAD_T + chartH - barH;
      const fill = (i === myBucket) ? '#c9a0ff' : '#3a2d6a';
      const stroke = (i === myBucket) ? '#e0d7ff' : '#4a3d8a';
      bars += '<rect x="' + (x+1) + '" y="' + y + '" width="' + (barW-2) + '" height="' + barH + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="0.5" rx="2"/>';
      if (i % 2 === 0) xLabels += '<text x="' + (x+barW/2) + '" y="' + (H-6) + '" fill="#6b5e99" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">' + (i*BUCKET) + '</text>';
    }

    const axis = '<line x1="' + PAD_L + '" y1="' + (PAD_T+chartH) + '" x2="' + (W-PAD_R) + '" y2="' + (PAD_T+chartH) + '" stroke="#3a2d6a" stroke-width="1"/>';
    const arrowX = PAD_L + myBucket * barW + barW / 2;
    const arrow = '<text x="' + arrowX + '" y="' + (PAD_T+2) + '" fill="#c9a0ff" font-size="9" text-anchor="middle" font-family="JetBrains Mono,monospace">▼ you</text>';

    document.getElementById('histogram-svg').innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">' + axis + bars + xLabels + arrow + '</svg>';

    const topClass = topPercent <= 25 ? 'top' : '';
    document.getElementById('histogram-stat').innerHTML =
      'You are in the <span class="hl ' + topClass + '">top ' + topPercent + '%</span> of all ' +
      '<span class="hl">' + scores.length + '</span> entries · median: <span class="hl">' + median(scores) + '</span>';

    document.getElementById('histogram-wrap').style.display = 'block';
  } catch(e) {}
}

function median(arr) {
  const s = arr.slice().sort(function(a,b) { return a-b; });
  const mid = Math.floor(s.length / 2);
  return s.length % 2 !== 0 ? s[mid] : Math.round((s[mid-1] + s[mid]) / 2);
}

function buildTarget(typed) {
  let html = '';
  for (let i = 0; i < TARGET.length; i++) {
    let cls = 'char';
    if (i < typed.length) cls += typed[i] === TARGET[i] ? ' correct' : ' wrong';
    else if (i === typed.length) cls += ' cursor';
    html += '<span class="' + cls + '">' + TARGET[i] + '</span>';
  }
  if (typed.length >= TARGET.length) html += '<span class="char cursor" style="border-bottom:2px solid #c9a0ff;opacity:0.4">&nbsp;</span>';
  targetEl.innerHTML = html;
}

function spawnEmote(x, y) {
  const el = document.createElement('div');
  el.className = 'emote-burst';
  el.style.left = (x-28) + 'px'; el.style.top = (y-28) + 'px';
  const img = document.createElement('img');
  img.src = EMOTE; img.alt = 'KEKWeird';
  el.appendChild(img); document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 1000);
}

function updateProgress() {
  const max = Math.max(count + 10, FIONA);
  progFill.style.width = Math.min((count / max) * 100, 100) + '%';
  const fp = Math.min((FIONA / max) * 100, 100);
  document.getElementById('fiona-line').style.left = fp + '%';
  document.getElementById('fiona-label').style.left = fp + '%';
  document.getElementById('progress-max').textContent = max;
}

function updateRate() {
  if (!startTime || count === 0) { rateEl.textContent = '—'; return; }
  const rate = Math.round((count / ((Date.now() - startTime) / 1000)) * 60);
  rateEl.textContent = rate;
  rateEl.style.color = rate >= FIONA ? '#5dca8a' : '#c9a0ff';
}

// ── GAME FLOW ─────────────────────────────────────────────────────────

function startGame() {
  count = 0; timeLeft = 60; gameState = 'running';
  startTime = Date.now(); prevInputLen = 0; lastComplete = 0;
  fetch(WORKER_URL + '/start', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) { sessionToken = d.token; });
  countEl.textContent = '0'; timerEl.textContent = '60'; timerEl.className = 'stat-value';
  rateEl.textContent = '—'; input.value = ''; input.disabled = false; input.focus();
  startBtn.style.display = 'none';
  buildTarget(''); updateProgress();
  timer = setInterval(function() {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 10) timerEl.className = 'stat-value warn';
    updateRate();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  clearInterval(timer); gameState = 'ended'; input.disabled = true;
  mainScr.style.display = 'none'; resultScr.style.display = 'block';
  document.getElementById('result-count').textContent = count;
  savedMsg.style.display = 'none'; saveBtn.disabled = false; saveBtn.textContent = 'SAVE';
  if (lastSavedName) nameInput.value = lastSavedName;
  document.getElementById('histogram-wrap').style.display = 'none';

  const diff = count - FIONA;
  const n = count >= FIONA ? 5 : count >= FIONA * 0.8 ? 3 : 2;
  const resEmotes = document.getElementById('result-emotes');
  resEmotes.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const img = document.createElement('img'); img.src = EMOTE; img.alt = 'KEKWeird'; resEmotes.appendChild(img);
  }

  let msg = '';
  if (count >= FIONA) {
    msg = '<span class="win">LEGENDARY!</span> You beat Fionapferd by <span class="hl">' + diff + '</span>!';
    for (let i = 0; i < 14; i++) setTimeout(function() { spawnEmote(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.7); }, i * 70);
  } else if (count >= FIONA * 0.9) {
    msg = 'SO CLOSE! Only <span class="hl">' + Math.abs(diff) + '</span> KEKWeird behind Fionapferd!';
  } else if (count >= FIONA * 0.6) {
    msg = '<span class="hl">' + Math.abs(diff) + '</span> behind Fionapferd. Getting closer!';
  } else {
    msg = 'Fionapferd is still <span class="hl">' + Math.abs(diff) + '</span> ahead. Keep practicing!';
  }
  document.getElementById('verdict-text').innerHTML = msg;
  fetchLeaderboard();
  fetchAndDrawHistogram(count);
}

// ── INPUT HANDLING ────────────────────────────────────────────────────

input.addEventListener('paste',       function(e) { e.preventDefault(); });
input.addEventListener('drop',        function(e) { e.preventDefault(); });
input.addEventListener('contextmenu', function(e) { e.preventDefault(); });

input.addEventListener('keydown', function(e) {
  if (gameState === 'idle') {
    if (e.key.length === 1 && e.key !== TARGET[0]) { e.preventDefault(); return; }
    startGame(); return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) { e.preventDefault(); return; }
  if (e.shiftKey && e.key === 'Insert') { e.preventDefault(); return; }
  if (gameState !== 'running') return;
  if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); return; }
  const cur = input.value;
  if (e.key.length === 1 && e.key !== TARGET[cur.length]) {
    e.preventDefault();
    input.classList.remove('wrong-input');
    void input.offsetWidth;
    input.classList.add('wrong-input');
    setTimeout(function() { input.classList.remove('wrong-input'); }, 200);
  }
});

input.addEventListener('input', function() {
  if (gameState !== 'running') return;
  const val = input.value;
  if (val.length - prevInputLen > 1) { input.value = val.slice(0, prevInputLen); return; }
  prevInputLen = val.length;
  buildTarget(val);
  if (val === TARGET) {
    const now = Date.now();
    if (now - lastComplete < 200) { input.value = ''; prevInputLen = 0; buildTarget(''); return; }
    lastComplete = now;
    count++; countEl.textContent = count;
    input.value = ''; prevInputLen = 0;
    input.className = 'correct-flash';
    setTimeout(function() { input.className = ''; }, 120);
    buildTarget(''); updateProgress(); updateRate();
    const r = input.getBoundingClientRect();
    spawnEmote(r.left + r.width / 2 + (Math.random() - 0.5) * 120, r.top - 10);
  } else {
    input.className = '';
  }
});

startBtn.addEventListener('click', startGame);

retryBtn.addEventListener('click', function() {
  resultScr.style.display = 'none'; mainScr.style.display = 'flex';
  gameState = 'idle'; count = 0; timeLeft = 60;
  prevInputLen = 0; lastComplete = 0;
  countEl.textContent = '0'; timerEl.textContent = '60'; timerEl.className = 'stat-value';
  rateEl.textContent = '—'; input.value = ''; input.disabled = false; input.className = '';
  progFill.style.width = '0%'; startBtn.style.display = ''; buildTarget('');
});

buildTarget('');
</script>
